<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora — Distribución Normal</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f7f6f2;
      --surface:   #ffffff;
      --surface2:  #f0ede6;
      --border:    rgba(0,0,0,0.08);
      --text:      #1a1a18;
      --muted:     #7a7870;
      --accent:    #2a6fad;
      --accent-lt: #aecce8;
      --bar-left:  #5baade;
      --bar-right: #b9d9f3;
      --radius:    12px;
      --shadow:    0 2px 16px rgba(0,0,0,0.06);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: var(--surface);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 2rem 2.5rem 2.5rem;
      width: 100%;
      max-width: 720px;
    }

    h1 {
      font-size: 15px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.02em;
      margin-bottom: 2rem;
      text-transform: uppercase;
      font-family: 'DM Mono', monospace;
    }

    /* sliders */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }
    .slider-row label {
      font-size: 13px;
      color: var(--muted);
      width: 68px;
      flex-shrink: 0;
    }
    .slider-row input[type=range] {
      flex: 1;
      -webkit-appearance: none;
      height: 4px;
      border-radius: 2px;
      background: var(--surface2);
      outline: none;
      cursor: pointer;
    }
    .slider-row input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--surface);
      border: 1.5px solid #bbb;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .slider-row input[type=range]:hover::-webkit-slider-thumb {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(42,111,173,0.12);
    }
    .slider-row .val {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      min-width: 36px;
      text-align: right;
    }

    /* metric cards */
    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin: 1.6rem 0;
    }
    .metric {
      background: var(--surface2);
      border-radius: var(--radius);
      padding: 1rem 1.2rem;
      text-align: center;
    }
    .metric-label {
      font-size: 11.5px;
      color: var(--muted);
      margin-bottom: 6px;
      font-family: 'DM Mono', monospace;
    }
    .metric-value {
      font-size: 26px;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    /* chart */
    .chart-wrap {
      position: relative;
      width: 100%;
      height: 280px;
    }

    /* legend */
    .legend {
      display: flex;
      gap: 18px;
      margin-top: 12px;
      font-size: 12px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }
    .legend span {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 3px;
    }

    @media (max-width: 480px) {
      .card { padding: 1.4rem 1.2rem 1.8rem; }
      .metrics { grid-template-columns: 1fr 1fr; }
      .metrics .metric:last-child { grid-column: 1 / -1; }
      .metric-value { font-size: 22px; }
    }
  </style>
</head>
<body>
<div class="card">
  <h1>Calculadora — distribución normal</h1>

  <div class="slider-row">
    <label>Media μ</label>
    <input type="range" id="mu" min="-10" max="10" step="0.5" value="0" />
    <span class="val" id="val-mu">0.0</span>
  </div>
  <div class="slider-row">
    <label>Desv. σ</label>
    <input type="range" id="sigma" min="0.5" max="10" step="0.5" value="5" />
    <span class="val" id="val-sigma">5.0</span>
  </div>
  <div class="slider-row">
    <label>Límite x</label>
    <input type="range" id="xlim" min="-20" max="20" step="0.5" value="5" />
    <span class="val" id="val-xlim">5.0</span>
  </div>

  <div class="metrics">
    <div class="metric">
      <div class="metric-label">P(X ≤ x)</div>
      <div class="metric-value" id="card-left">—</div>
    </div>
    <div class="metric">
      <div class="metric-label">P(X &gt; x)</div>
      <div class="metric-value" id="card-right">—</div>
    </div>
    <div class="metric">
      <div class="metric-label">Z-score</div>
      <div class="metric-value" id="card-z">—</div>
    </div>
  </div>

  <div class="chart-wrap">
    <canvas id="normChart" role="img" aria-label="Histograma de distribución normal. El área azul oscura representa P(X menor o igual a x) y el área azul clara P(X mayor que x)."></canvas>
  </div>

  <div class="legend">
    <span><span class="legend-dot" style="background:#5baade;"></span>P(X ≤ x)</span>
    <span><span class="legend-dot" style="background:#b9d9f3;"></span>P(X &gt; x)</span>
  </div>
</div>

<script>
  /* ── utilidades estadísticas ── */
  function normalPDF(x, mu, sigma) {
    return (1 / (sigma * Math.sqrt(2 * Math.PI))) *
           Math.exp(-0.5 * Math.pow((x - mu) / sigma, 2));
  }

  function erf(x) {
    const t = 1 / (1 + 0.3275911 * Math.abs(x));
    const p = t * (0.254829592 + t * (-0.284496736 + t * (1.421413741 +
              t * (-1.453152027 + t * 1.061405429))));
    const r = 1 - p * Math.exp(-x * x);
    return x >= 0 ? r : -r;
  }

  function normalCDF(x, mu, sigma) {
    return 0.5 * (1 + erf((x - mu) / (sigma * Math.sqrt(2))));
  }

  /* ── construcción de datos ── */
  function buildData(mu, sigma, xlim) {
    const xMin = mu - 4.2 * sigma;
    const xMax = mu + 4.2 * sigma;
    const n = 90;
    const step = (xMax - xMin) / n;

    const labels = [], left = [], right = [];
    for (let i = 0; i <= n; i++) {
      const x = xMin + i * step;
      const pdf = normalPDF(x, mu, sigma);
      labels.push(parseFloat(x.toFixed(2)));
      if (x <= xlim) { left.push(pdf);  right.push(null); }
      else            { left.push(null); right.push(pdf);  }
    }

    const pLeft = normalCDF(xlim, mu, sigma);
    const z     = (xlim - mu) / sigma;

    /* ticks: cada σ */
    const ticks = labels.map(l => {
      const nearest = Math.round((l - mu) / sigma) * sigma + mu;
      return Math.abs(l - nearest) < step * 0.55
        ? parseFloat(nearest.toFixed(1))
        : '';
    });

    return { labels, left, right, pLeft, z, ticks };
  }

  /* ── chart inicial ── */
  const d = buildData(0, 5, 5);

  const chart = new Chart(document.getElementById('normChart').getContext('2d'), {
    type: 'bar',
    data: {
      labels: d.labels,
      datasets: [
        { label: 'P(X≤x)', data: d.left,
          backgroundColor: '#5baade', borderColor: '#5baade',
          borderWidth: 0, barPercentage: 1.02, categoryPercentage: 1.02 },
        { label: 'P(X>x)', data: d.right,
          backgroundColor: '#b9d9f3', borderColor: '#b9d9f3',
          borderWidth: 0, barPercentage: 1.02, categoryPercentage: 1.02 }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 60 },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            title: items => 'x = ' + parseFloat(items[0].label).toFixed(2),
            label: item  => 'f(x) = ' + (item.parsed.y ?? 0).toFixed(5)
          }
        }
      },
      scales: {
        x: {
          ticks: {
            callback: (_, i) => d.ticks[i] !== '' ? d.ticks[i] : '',
            maxRotation: 0, autoSkip: false,
            color: '#9a9890', font: { size: 11 }
          },
          grid: { display: false },
          border: { display: false }
        },
        y: {
          ticks: {
            callback: v => v.toFixed(2),
            color: '#9a9890', font: { size: 11 }, maxTicksLimit: 6
          },
          grid: { color: 'rgba(0,0,0,0.05)' },
          border: { display: false }
        }
      }
    }
  });

  /* ── actualización de ticks (parchamos la referencia) ── */
  let currentTicks = d.ticks;
  chart.options.scales.x.ticks.callback = (_, i) =>
    currentTicks[i] !== '' ? currentTicks[i] : '';

  /* ── actualización en tiempo real ── */
  function update() {
    const mu    = parseFloat(document.getElementById('mu').value);
    const sigma = parseFloat(document.getElementById('sigma').value);
    const xlim  = parseFloat(document.getElementById('xlim').value);

    document.getElementById('val-mu').textContent    = mu.toFixed(1);
    document.getElementById('val-sigma').textContent = sigma.toFixed(1);
    document.getElementById('val-xlim').textContent  = xlim.toFixed(1);

    const nd = buildData(mu, sigma, xlim);
    currentTicks = nd.ticks;

    chart.data.labels              = nd.labels;
    chart.data.datasets[0].data   = nd.left;
    chart.data.datasets[1].data   = nd.right;
    chart.update();

    document.getElementById('card-left').textContent  = (nd.pLeft * 100).toFixed(1) + '%';
    document.getElementById('card-right').textContent = ((1 - nd.pLeft) * 100).toFixed(1) + '%';
    document.getElementById('card-z').textContent     = nd.z.toFixed(2);
  }

  ['mu','sigma','xlim'].forEach(id =>
    document.getElementById(id).addEventListener('input', update)
  );

  update(); /* render inicial con valores correctos */
</script>
</body>
</html>
