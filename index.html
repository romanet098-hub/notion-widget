<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Regresión Lineal Interactiva</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 700px;
  margin: auto;
}

.slider {
  width: 80%;
  margin: 10px 0;
}
</style>
</head>

<body>

<div class="container">

<h2>📊 Regresión Lineal Interactiva</h2>

<canvas id="chart"></canvas>

<p>Pendiente (m): <span id="mVal">1</span></p>
<input class="slider" type="range" min="-5" max="5" step="0.1" value="1" id="m">

<p>Intercepto (b): <span id="bVal">0</span></p>
<input class="slider" type="range" min="-10" max="10" step="0.1" value="0" id="b">

<p>Ruido:</p>
<input class="slider" type="range" min="0" max="50" step="1" value="10" id="noise">

</div>

<script>
let ctx = document.getElementById('chart').getContext('2d');

function generateData(m, b, noise) {
    let data = [];
    let line = [];

    for (let x = -10; x <= 10; x += 1) {
        let y = m * x + b + (Math.random() * noise - noise / 2);
        data.push({x: x, y: y});
        line.push({x: x, y: m * x + b});
    }

    return {data, line};
}

let mSlider = document.getElementById("m");
let bSlider = document.getElementById("b");
let noiseSlider = document.getElementById("noise");

let chart = new Chart(ctx, {
    type: 'scatter',
    data: {
        datasets: [
            {
                label: 'Datos',
                data: [],
                backgroundColor: 'blue'
            },
            {
                label: 'Regresión',
                data: [],
                type: 'line',
                borderColor: 'red',
                fill: false
            }
        ]
    },
    options: {
        responsive: true,
        scales: {
            x: {type: 'linear', position: 'bottom'}
        }
    }
});

function update() {
    let m = parseFloat(mSlider.value);
    let b = parseFloat(bSlider.value);
    let noise = parseFloat(noiseSlider.value);

    document.getElementById("mVal").innerText = m;
    document.getElementById("bVal").innerText = b;

    let result = generateData(m, b, noise);

    chart.data.datasets[0].data = result.data;
    chart.data.datasets[1].data = result.line;
    chart.update();
}

mSlider.oninput = update;
bSlider.oninput = update;
noiseSlider.oninput = update;

update();
</script>

</body>
</html>
